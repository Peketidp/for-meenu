<!DOCTYPE html>
<html>
<head>
<title>For Meenu 🎬</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  color: red;
  letter-spacing: 3px;
  z-index: 999;
}

/* PROFILE SCREEN */
#profiles {
  display: none;
  height: 100vh;
  text-align: center;
  padding-top: 100px;
  position: relative;

  background:
    linear-gradient(to top, black 30%, transparent 80%),
    linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("bg.jpg") center/cover no-repeat;
}

/* BLUR EFFECT */
#profiles::before {
  content: "";
  position: absolute;
  inset: 0;
  backdrop-filter: blur(8px);
  z-index: -1;
}

.profile-container {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 50px;
}

.profile {
  cursor: pointer;
  text-align: center;
}

.profile img {
  width: 110px;
  height: 110px;
  border-radius: 10px;
  transition: 0.3s;
}

.profile:hover img {
  transform: scale(1.1);
}

.name {
  margin-top: 10px;
  font-size: 18px;
}

/* PLAYER */
#player {
  display: none;
  position: relative;
  height: 100vh;
}

/* VIDEO */
#video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to top, black 20%, transparent 60%),
    linear-gradient(to right, black 25%, transparent 70%);
}

/* SUBTITLE */
#msg {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
  font-size: 28px;
  opacity: 0;
  transition: 0.6s;
  text-shadow: 0 0 10px black;
}

/* PROGRESS */
#progressBox {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 4px;
  background: #222;
}

#progress {
  height: 100%;
  width: 0%;
  background: red;
}
</style>
</head>

<body>

<!-- NETFLIX INTRO -->
<div id="intro">NETFLIX</div>

<!-- PROFILE SCREEN -->
<div id="profiles">
  <h2>Who's watching?</h2>

  <div class="profile-container">

    <!-- YOUR PROFILE -->
    <div class="profile" onclick="startMovie()">
      <img src="https://i.imgur.com/1X6sZ4C.png">
      <div class="name">Dp</div>
    </div>

    <!-- HER PROFILE -->
    <div class="profile" onclick="startMovie()">
      <img src="https://i.imgur.com/8Km9tLL.png">
      <div class="name">Meenu</div>
    </div>

        <div class="profile" onclick="startMovie()">
      <img src="https://i.imgur.com/8Km9tLL.png">
      <div class="name">Kids</div>
    </div>

  </div>
</div>

<!-- PLAYER -->
<div id="player">
  <video id="video" muted playsinline></video>
  <div id="overlay"></div>
  <div id="msg"></div>
  <div id="progressBox"><div id="progress"></div></div>
</div>

<!-- MUSIC -->
<audio id="bgm" src="music.mp3" preload="auto"></audio>

<script>

// 🎬 SCENES (YOUR 6 VIDEOS)
let scenes = [
{ text: "Some people just come into life…", src: "video1.mp4" },
{ text: "And slowly become special…", src: "video2.mp4" },
{ text: "Without even realizing it ❤️", src: "video3.mp4" },
{ text: "And today… is about you 🎂", src: "video4.mp4" },
{ text: "🎉 HAPPY BIRTHDAY MEENU 🎉", src: "video5.mp4" },
{ text: "I’m really glad I know you 💖", src: "video6.mp4" }
];

let i = 0;

/* FLOW */
setTimeout(() => {
  intro.style.display = "none";
  profiles.style.display = "block";
}, 2500);

function startMovie() {
  profiles.style.display = "none";
  player.style.display = "block";

  // 🎧 MUSIC FADE IN
  let music = document.getElementById("bgm");
  music.volume = 0;
  music.play().catch(()=>{});

  let v = 0;
  let fade = setInterval(() => {
    if (v < 0.5) {
      v += 0.02;
      music.volume = v;
    } else clearInterval(fade);
  }, 200);

  playScene();
}

function playScene() {

  if (i >= scenes.length) return;

  let scene = scenes[i];

  video.src = scene.src;
  video.muted = true;
  video.volume = 0;

  msg.style.opacity = 0;

  setTimeout(() => {
    msg.innerHTML = scene.text;
    msg.style.opacity = 1;
  }, 500);

  progress.style.width = ((i+1)/scenes.length)*100 + "%";

  // 🎯 BIG TEXT EFFECT
  if (scene.text.includes("HAPPY BIRTHDAY")) {
    msg.style.fontSize = "36px";
  } else {
    msg.style.fontSize = "28px";
  }

  video.play().catch(()=>{});

  video.onended = () => {
    i++;
    playScene();
  };
}

</script>

</body>
</html>
