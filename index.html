<!DOCTYPE html>
<html>
<head>
<title>For Meenu 🎬</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
}

/* APP SCREEN */
#apps {
  height: 100vh;
  background: black;
  text-align: center;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.apps-container {
  display: flex;
  gap: 40px;
  margin-top: 30px;
}

.app {
  cursor: pointer;
}

.logo {
  width: 80px;
  height: 80px;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 35px;
  font-weight: bold;
}

.netflix { background: red; }
.prime { background: #00A8E1; }
.disney { background: #113CCF; }

.app:hover { transform: scale(1.1); }

/* LOGIN */
#login {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}

input {
  width: 250px;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px 20px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
}

#error { color: #ff4d4d; }

/* INTRO */
#intro {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  color: red;
}

/* PROFILES */
#profiles {
  display: none;
  height: 100vh;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background:
    linear-gradient(to top, black 30%, transparent 80%),
    linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("bg.jpg") center/cover no-repeat;
}

.profile-container {
  display: flex;
  gap: 40px;
  margin-top: 30px;
}

.profile {
  text-align: center;
  cursor: pointer;
}

.profile img {
  width: 110px;
  height: 110px;
  border-radius: 10px;
}

.name { margin-top: 10px; }

/* PLAYER */
#player {
  display: none;
  position: relative;
  height: 100vh;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, black 20%, transparent 60%);
}

/* SUBTITLE */
#msg {
  position: absolute;
  bottom: 120px;
  width: 100%;
  text-align: center;
  font-size: 26px;
  opacity: 0;
  transition: 0.6s;
}

@media (max-width:600px){
  #msg { bottom:140px; font-size:20px; }
}

/* PROGRESS */
#progressBox {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 4px;
  background: #222;
}

#progress {
  height: 100%;
  width: 0%;
  background: red;
}

/* ENDING */
#ending {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  text-align: center;
  padding-top: 120px;
}
</style>
</head>

<body>

<!-- APP SCREEN -->
<div id="apps">
  <h2>Select App</h2>
  <div class="apps-container">
    <div class="app" onclick="openApp('netflix')">
      <div class="logo netflix">N</div>
      <p>Netflix</p>
    </div>
    <div class="app">
      <div class="logo prime">P</div>
      <p>Prime</p>
    </div>
    <div class="app">
      <div class="logo disney">D</div>
      <p>Disney+</p>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Sign In</h2>
    <input type="text" value="meenu.dp0404@gmail.com" readonly><br>
    <input type="password" id="pass" placeholder="Enter Password"><br>
    <button onclick="checkLogin()">Sign In</button>
    <div id="error"></div>
  </div>
</div>

<!-- INTRO -->
<div id="intro">NETFLIX</div>

<!-- PROFILES -->
<div id="profiles">
  <h2>Who's watching?</h2>
  <div class="profile-container">
    <div class="profile" onclick="startMovie()">
      <img src="https://i.imgur.com/2yaf2wb.png">
      <div class="name">Dp 🕷️</div>
    </div>
    <div class="profile" onclick="startMovie()">
      <img src="https://i.imgur.com/8Km9tLL.png">
      <div class="name">Meenu ❤️</div>
    </div>
    <div class="profile" onclick="startMovie()">
      <div style="font-size:70px;">👶</div>
      <div class="name">Kids</div>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="player">
  <video id="video" muted playsinline></video>
  <div id="overlay"></div>
  <div id="msg"></div>
  <div id="progressBox"><div id="progress"></div></div>
</div>

<!-- ENDING -->
<div id="ending">
  <h1>🎂 Happy Birthday Meenu 💖</h1>
  <p>Hope this made you smile 😊</p>
  <button onclick="location.reload()">▶ Replay</button>
</div>

<audio id="bgm" src="music.mp3"></audio>

<script>

function openApp(app){
  if(app==="netflix"){
    apps.style.display="none";
    login.style.display="flex";
  }
}

let attempts=0;
function checkLogin(){
  if(pass.value==="Dp@0404"){
    login.style.display="none";
    intro.style.display="flex";
    setTimeout(()=>{
      intro.style.display="none";
      profiles.style.display="flex";
    },2000);
  } else {
    attempts++;
    error.innerHTML = attempts<3 ? "Try again 😄" : "Hint: Dp@0404";
  }
}

pass.addEventListener("keypress",e=>{
  if(e.key==="Enter") checkLogin();
});

let scenes=[
{ text:"Hey… are you awake? 🌅", src:"video1.mp4"},
{ text:"Some people just come into life…", src:"video2.mp4"},
{ text:"And slowly become special…", src:"video3.mp4"},
{ text:"Without even realizing it ❤️", src:"video4.mp4"},
{ text:"🎉 HAPPY BIRTHDAY MEENU 🎉", src:"video5.mp4"},
{ text:"I’m really glad I know you 💖", src:"video6.mp4"}
];

let i=0;

function startMovie(){
  profiles.style.display="none";
  player.style.display="block";
  bgm.volume=0.4;
  bgm.play();
  playScene();
}

function playScene(){
  if(i>=scenes.length){
    player.style.display="none";
    ending.style.display="block";
    return;
  }

  let s=scenes[i];
  video.src=s.src;
  msg.innerHTML=s.text;
  msg.style.opacity=1;
  progress.style.width=((i+1)/scenes.length)*100+"%";

  video.play();
  video.onended=()=>{ i++; playScene(); };
}

</script>

</body>
</html>
