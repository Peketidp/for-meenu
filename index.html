<!DOCTYPE html>
<html>
<head>
<title>April 1st</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: url("bg.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
  z-index: 3000;
}

#popupBox {
  background: #222;
  padding: 30px;
  border-radius: 12px;
}

/* loading */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  z-index: 1000;
}

#main {
  display: none;
  margin-top: 120px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #00c853; }
#noBtn { background: #d50000; color: white; }

#msg {
  font-size: 28px;
  opacity: 0;
  transition: opacity 1s;
  min-height: 80px;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 26px;
  animation: fly 5s linear forwards;
}

@keyframes fly {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* game hearts */
.popHeart {
  position: fixed;
  font-size: 50px;
  cursor: pointer;
  z-index: 1500;
}

/* flash */
#flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: red;
  opacity: 0;
  z-index: 2000;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="flash"></div>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <h3>One last thing… 🎁</h3>
    <button onclick="showBirthday()">Open it 😄</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <span>Loading something for Meenu... 😄</span>
  <p style="font-size:18px;">While you wait… catch the hearts  if you can❤️</p>
  <span id="countdown"></span>
</div>

<div id="main">
  <h2>Meenu… should I say this today or not? 😄</h2>
  <button onclick="startStory()">Click me</button>
  <button onclick="moveButton()">Don't click</button>
  <p id="msg"></p>
</div>

<audio id="bgm">
  <source src="music.mp3">
</audio>

<script>

// timer
let t=20;
let c=setInterval(()=>{
  countdown.innerHTML="Wait a moment… "+t+"s ⏳";
  t--;
  if(t<0){
    clearInterval(c);
    clearInterval(game);
    loading.style.display="none";
    main.style.display="block";
  }
},1000);

// game
function spawn(){
  let h=document.createElement("div");
  h.className="popHeart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*90+"vw";
  h.style.top=Math.random()*90+"vh";

  function pop(){
    h.innerHTML="💥";
    flash.style.opacity=0.7;
    setTimeout(()=>flash.style.opacity=0,2000);
    setTimeout(()=>h.remove(),200);
  }

  h.onclick=pop;
  h.ontouchstart=pop;

  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
}
let game=setInterval(spawn,600);

// move button
function moveButton(){
  noBtn.style.position="absolute";
  noBtn.style.top=Math.random()*window.innerHeight+"px";
  noBtn.style.left=Math.random()*window.innerWidth+"px";
}

// story
let lines=[
"I thought of saying something today…",
"But then I realized it's April 1st 😄",
"So you probably won’t take it seriously.",
"Still… I enjoy talking to you.",
"More than I expected.",
"And yeah… this part isn’t a joke."
];
let i=0;

function startStory(){
  bgm.play();
  next();
}

function next(){
  if(i<lines.length){
    msg.innerHTML=lines[i];
    msg.style.opacity=1;
    setTimeout(()=>{
      msg.style.opacity=0;
      i++;
      setTimeout(next,1000);
    },2500);
  }else{
    endMsg();
  }
}

// end message
function endMsg(){
  msg.style.opacity=1;
  msg.innerHTML=`
  And yeah… this part isn’t a joke ❤️<br><br>
  <button onclick="aprilFool()">One more thing 😄</button>
  `;
}

// fool
function aprilFool(){
  msg.innerHTML=`
  APRIL FOOL 😂😂😂<br><br>
  but I meant some of it 😄
  `;
  popup.style.display="flex"; // show popup
}

// birthday
function showBirthday(){
  popup.style.display="none";

  msg.innerHTML=`
  🎁 Advance Happy Birthday Meenluu🤪 🎂❤️<br><br>
  <div id="bday"></div>
  `;

  let target=new Date();
  target.setMonth(3);target.setDate(4);

  let timer=setInterval(()=>{
    let d=new Date();
    let diff=target-d;

    let days=Math.floor(diff/(1000*60*60*24));
    let h=Math.floor((diff/(1000*60*60))%24);
    let m=Math.floor((diff/(1000*60))%60);
    let s=Math.floor((diff/1000)%60);

    bday.innerHTML=days+"d "+h+"h "+m+"m "+s+"s";

    if(diff<0){
      clearInterval(timer);
      bday.innerHTML="🎉 Happy Birthday ❤️";
    }
  },1000);
}

</script>
</body>
</html>
