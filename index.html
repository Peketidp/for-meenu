<!DOCTYPE html>
<html>
<head>
<title>April 1st</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

#main {
  margin-top: 120px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #00c853; }
#noBtn { background: #d50000; color: white; }

#msg {
  margin-top: 40px;
  font-size: 22px;
  min-height: 100px;
}

/* hearts animation */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: float 4s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="main">
  <h2>Meenu... this might be a mistake 😄</h2>

  <button id="yesBtn" onclick="startStory()">Click me</button>
  <button id="noBtn" onclick="moveButton()">Don't click</button>

  <p id="msg"></p>
</div>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function moveButton() {
  let btn = document.getElementById("noBtn");
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

function typeText(text, speed = 35, callback) {
  let i = 0;
  let msg = document.getElementById("msg");
  msg.innerHTML = "";

  function typing() {
    if (i < text.length) {
      msg.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else if (callback) {
      setTimeout(callback, 1000);
    }
  }
  typing();
}

function startStory() {
  let music = document.getElementById("bgm");
  music.volume = 0.4;
  music.play();

  typeText("Okay Meenu...\n\nI was actually planning to say something today.", 35, step2);
}

function step2() {
  typeText("But then I remembered... it's April 1st 😄", 35, step3);
}

function step3() {
  typeText("So anything I say today will sound like a joke...", 35, step4);
}

function step4() {
  typeText("But still...\n\nI didn't want to completely hide it.", 35, step5);
}

function step5() {
  typeText("I actually enjoy talking to you a lot.\n\nMore than I expected.", 35, finalStep);
}

function finalStep() {
  typeText("And yeah...\n\nThis part isn't a joke.", 40);
  startHearts();
}

function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }, 300);
}

</script>

</body>
</html>
