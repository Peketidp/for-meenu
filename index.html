<!DOCTYPE html>
<html>
<head>
<title>April 1st</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;

  background: url("bg.jpg") no-repeat center center fixed;
  background-size: cover;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* loading */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}

/* main */
#main {
  display: none;
  margin-top: 120px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #00c853; }
#noBtn { background: #d50000; color: white; }

#msg {
  font-size: 22px;
  opacity: 0;
  transition: opacity 1s;
  min-height: 80px;
}

/* butterflies */
.butterfly {
  position: absolute;
  font-size: 20px;
  animation: fly 4s linear forwards;
}

@keyframes fly {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="loading">Loading something for Meenu... 😄</div>

<div id="main">

  <h2>Meenu… should I say this today or not? 😄</h2>

  <button id="yesBtn" onclick="startStory()">Click me</button>
  <button id="noBtn" onclick="moveButton()">Don't click</button>

  <p id="msg"></p>

</div>

<audio id="bgm">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// loading screen
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2000);

// moving button
function moveButton() {
  let btn = document.getElementById("noBtn");
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

// story lines
let lines = [
"I thought of saying something today…",
  "",
"But then I realized it's April 1st 😄",
  "",
"So you probably won’t take it seriously.",
  "",
"Still… I enjoy talking to you.",
  "",
"More than I expected.",
  "",
"And yeah…this part isn’t a joke."
];

let i = 0;

function startStory() {
  let music = document.getElementById("bgm");
  music.volume = 0.5;
  music.play();

  showNext();
}

function showNext() {
  let msg = document.getElementById("msg");

  if (i < lines.length) {
    msg.innerHTML = lines[i];
    msg.style.opacity = 1;

    createButterflies();

    setTimeout(() => {
      msg.style.opacity = 0;
      i++;
      setTimeout(showNext, 1000);
    }, 2500);

  } else {
    showFullMessage();
  }
}

// butterflies
function createButterflies() {
  for (let j = 0; j < 5; j++) {
    let b = document.createElement("div");
    b.className = "butterfly";
    b.innerHTML = "🦋";
    b.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(b);

    setTimeout(() => b.remove(), 4000);
  }
}

// final message
function showFullMessage() {
  let msg = document.getElementById("msg");

  msg.style.opacity = 1;
  msg.innerHTML = `
<div>I thought of saying something today…</div><br>
<div>But then I realized it's April 1st 😄</div><br>
<div>So you probably won’t take it seriously.</div><br>
<div>Still… I enjoy talking to you.</div><br>
<div>More than I expected.</div><br>
<div>And yeah… this part isn’t a joke.</div>
`;
}

</script>

</body>
</html>
