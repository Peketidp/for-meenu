<!DOCTYPE html>
<html>
<head>
<title>April 1st</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}

#main {
  display: none;
  margin-top: 100px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #00c853; }
#noBtn { background: #d50000; color: white; }

#msg {
  margin-top: 30px;
  font-size: 20px;
  min-height: 80px;
}
</style>
</head>

<body>

<div id="loading">Loading something for Meenu... 😄</div>

<div id="main">
  <h2>Hey Meenu... you actually opened this 😄</h2>

  <button id="yesBtn" onclick="startMessage()">Click me</button>
  <button id="noBtn" onclick="moveButton()">Don't click</button>

  <p id="msg"></p>
</div>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2000);

function moveButton() {
  let btn = document.getElementById("noBtn");
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

function typeText(text, i = 0) {
  if (i < text.length) {
    document.getElementById("msg").innerHTML += text.charAt(i);
    setTimeout(() => typeText(text, i + 1), 35);
  }
}

function startMessage() {
  document.getElementById("msg").innerHTML = "";

  let message = "Okay Meenu...\n\n" +
                "I was actually planning to say something today.\n\n" +
                "But then I realized it's April 1st 😄\n\n" +
                "So anything I say will sound like a joke.\n\n" +
                "But still...\n\n" +
                "I really enjoy talking to you.\n\n" +
                "And yeah... I meant that.";

  typeText(message);

  let music = document.getElementById("bgm");
  music.volume = 0.5; // softer sound
  music.play();
}

</script>

</body>
</html>
