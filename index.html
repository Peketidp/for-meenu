<!DOCTYPE html>
<html>
<head>
<title>April 1st</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
  margin-top: 120px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin-top: 20px;
  border-radius: 8px;
  border: none;
  background: #00c853;
  color: white;
  cursor: pointer;
}

#msg {
  margin-top: 30px;
  font-size: 20px;
  opacity: 0;
  transition: 1s;
}
</style>
</head>

<body>

<h2>Meenu… should I say this today or not? 😄</h2>

<button onclick="show()">Click to find out</button>

<p id="msg"></p>

<script>
function show() {
  let msg = document.getElementById("msg");

  msg.innerHTML =
  "I thought of saying something today…<br><br>" +
  "But then I realized it's April 1st 😄<br><br>" +
  "So you probably won’t take it seriously.<br><br>" +
  "Still… I enjoy talking to you.<br><br>" +
  "More than I expected.";

  msg.style.opacity = 1;
}
</script>

</body>
</html>
