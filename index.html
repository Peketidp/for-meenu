<!DOCTYPE html>
<html>
<head>
<title>For Meenu 🎬</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* HERO */
#hero {
  height: 100vh;
  background:
    linear-gradient(to top, black 20%, transparent 60%),
    linear-gradient(to right, black 30%, transparent 70%),
    url("bg.jpg") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

#playBtn {
  padding: 15px 30px;
  font-size: 20px;
  background: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

/* LOADING */
#loading {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}

/* PLAYER */
#player {
  display: none;
  position: relative;
  height: 100vh;
  width: 100%;
}

/* VIDEO */
#video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1s ease;
}

/* SUBTITLE */
#msg {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
  font-size: 26px;
  opacity: 0;
  transition: 1s;
  text-shadow: 0 0 10px black;
}

/* PROGRESS */
#progressBox {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 4px;
  background: #333;
}

#progress {
  height: 100%;
  width: 0%;
  background: red;
}
</style>
</head>

<body>

<!-- HERO -->
<div id="hero">
  <button id="playBtn" onclick="startMovie()">▶ Play</button>
</div>

<!-- LOADING -->
<div id="loading">Preparing your story… 🎬</div>

<!-- PLAYER -->
<div id="player">
  <video id="video" muted playsinline></video>
  <div id="msg"></div>
  <div id="progressBox"><div id="progress"></div></div>
</div>

<!-- BACKGROUND MUSIC -->
<audio id="bgm" src="music.mp3" preload="auto"></audio>

<script>

// 🎬 YOUR 6 VIDEO STORY
let scenes = [

{
  text: "Some people just come into life…",
  src: "video1.mp4"
},

{
  text: "And slowly become important…",
  src: "video2.mp4"
},

{
  text: "Without even realizing it ❤️",
  src: "video3.mp4"
},

{
  text: "And today… is all about you 🎂",
  src: "video4.mp4"
},

{
  text: "🎉 HAPPY BIRTHDAY MEENU 🎉",
  src: "video5.mp4"
},

{
  text: "I’m really glad I know you 💖",
  src: "video6.mp4"
}

];

let i = 0;

function startMovie() {

  loading.style.display = "flex";

  setTimeout(() => {
    loading.style.display = "none";
    hero.style.display = "none";
    player.style.display = "block";

    // 🎧 BACKGROUND MUSIC (fade in)
    let music = document.getElementById("bgm");
    music.volume = 0;
    music.play().catch(()=>{});

    let v = 0;
    let fade = setInterval(() => {
      if (v < 0.5) {
        v += 0.02;
        music.volume = v;
      } else {
        clearInterval(fade);
      }
    }, 200);

    playScene();

  }, 2000);
}

function playScene() {

  if (i >= scenes.length) return;

  let scene = scenes[i];

  // fade out
  video.style.opacity = 0;
  msg.style.opacity = 0;

  setTimeout(() => {

    // 🎥 LOAD VIDEO
    video.src = scene.src;
    video.style.opacity = 1;

    // 🔇 FORCE MUTE
    video.muted = true;
    video.volume = 0;

    // 💬 SUBTITLE
    msg.innerHTML = scene.text;
    msg.style.opacity = 1;

    // 📊 PROGRESS BAR
    progress.style.width = ((i+1)/scenes.length)*100 + "%";

    // 🎯 BIG MOMENT STYLE
    if (scene.text.includes("HAPPY BIRTHDAY")) {
      msg.style.fontSize = "36px";
    } else {
      msg.style.fontSize = "26px";
    }

    // ▶ PLAY VIDEO
    video.play().catch(()=>{});

    // ⏭ NEXT WHEN VIDEO ENDS
    video.onended = () => {
      i++;
      playScene();
    };

  }, 600);
}

</script>

</body>
</html>
