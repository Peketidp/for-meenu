<!DOCTYPE html>
<html>
<head>
<title>For Meenu 🎬</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* NAV */
#nav {
  padding: 15px 30px;
  font-size: 26px;
  font-weight: bold;
  color: red;
}

/* HERO */
#hero {
  height: 100vh;
  background: url("bg.jpg") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 50px;
  background-color: rgba(0,0,0,0.7);
  background-blend-mode: darken;
}

#title {
  font-size: 55px;
  font-weight: bold;
}

#playBtn {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 18px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

/* PLAYER */
#player {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* SUBTITLE STYLE */
#msg {
  position: absolute;
  bottom: 80px;
  font-size: 26px;
  max-width: 80%;
  text-align: center;
  opacity: 0;
  transition: 1s;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* PROGRESS */
#progressBox {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 4px;
  background: #333;
}

#progress {
  height: 100%;
  width: 0%;
  background: red;
}

/* SPOTLIGHT */
#spotlight {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  opacity: 0;
  transition: 1s;
  pointer-events: none;
}

/* LOADING */
#loading {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}
</style>
</head>

<body>

<div id="nav">NETFLIX</div>

<div id="hero">
  <div id="title">Meenu ❤️</div>
  <button id="playBtn" onclick="startMovie()">▶ Play</button>
</div>

<div id="loading">Preparing your story… 🎬</div>

<div id="player">
  <div id="msg"></div>
  <div id="progressBox"><div id="progress"></div></div>
</div>

<div id="spotlight"></div>

<audio id="bgm" src="music.mp3"></audio>

<script>

let lines = [
"Some stories feel normal…",
"But some feel different…",
"And this one… is yours 🎂",
"",
"I didn’t want to just send a message…",
"So I made this…",
"",
"Because you matter ❤️",
"",
"🎉 HAPPY BIRTHDAY MEENU 🎉",
"",
"You make things better just by being there 😉",
"",
"And I’m really glad I know you 💖"
];

let i = 0;

function startMovie() {

  loading.style.display = "flex";

  setTimeout(() => {
    loading.style.display = "none";
    hero.style.display = "none";
    player.style.display = "flex";

    // 🎧 music fade in
    let music = document.getElementById("bgm");
    music.volume = 0;
    music.play().catch(()=>{});

    let v = 0;
    let fade = setInterval(() => {
      if (v < 0.5) {
        v += 0.02;
        music.volume = v;
      } else clearInterval(fade);
    }, 200);

    playStory();

  }, 2000);
}

function playStory() {

  if (i < lines.length) {

    msg.style.opacity = 0;

    setTimeout(() => {

      msg.innerHTML = lines[i];
      msg.style.opacity = 1;

      progress.style.width = ((i+1)/lines.length)*100 + "%";

      // 💡 spotlight during final reveal
      if (lines[i].includes("HAPPY BIRTHDAY")) {
        spotlight.style.opacity = 1;
        msg.style.fontSize = "34px";
      }

      i++;
      setTimeout(playStory, 2600);

    }, 600);
  }
}

</script>

</body>
</html>
