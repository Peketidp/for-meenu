<!DOCTYPE html>
<html>
<head>
<title>Her Birthday 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: url("bg.jpg") no-repeat center center fixed;
  background-size: cover;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  z-index: 1000;
}

#main {
  display: none;
  margin-top: 120px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #00c853; }
#noBtn { background: #d50000; color: white; }

#msg {
  font-size: 28px;
  opacity: 0;
  transition: opacity 1s;
}

.popHeart {
  position: fixed;
  font-size: 50px;
  cursor: pointer;
  z-index: 1500;
}

#flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: pink;
  opacity: 0;
  z-index: 2000;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="flash"></div>

<!-- LOADING -->
<div id="loading">
  <span>Loading something for Meenu... 😄</span>

  <p style="font-size:18px;">
    While you wait… catch the hearts the if you can❤️
  </p>

  <span id="countdown"></span>

  <div id="score" style="font-size:20px; margin-top:10px;">
    Hearts popped: 0 ❤️
  </div>
</div>

<div id="main">

  <h2>Hey Meenu… 😄</h2>

  <p style="font-size:18px; opacity:0.8;">
    plug in your earphones… 🎧
  </p>

  <button id="yesBtn" onclick="startStory()">Start</button>
  <button id="noBtn" onclick="moveButton()">Skip 😏</button>

  <p id="msg"></p>

</div>

<audio id="bgm" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// ❤️ SCORE
let score = 0;

// ⏳ TIMER
let t = 10;
let c = setInterval(() => {
  countdown.innerHTML = "Wait… " + t + "s ⏳";
  t--;
  if (t < 0) {
    clearInterval(c);
    clearInterval(game);
    loading.style.display = "none";
    main.style.display = "block";

    msg.style.opacity = 1;
    msg.innerHTML = "😄 You popped " + score + " hearts ❤️";
  }
}, 1000);

// 🎮 HEART GAME
function spawn() {
  let h = document.createElement("div");
  h.className = "popHeart";
  h.innerHTML = "💗";

  h.style.left = Math.random() * 90 + "vw";
  h.style.top = Math.random() * 90 + "vh";

  function pop() {
    h.innerHTML = "💥";
    score++;
    document.getElementById("score").innerHTML =
      "Hearts popped: " + score + " ❤️";

    flash.style.opacity = 0.7;
    setTimeout(() => flash.style.opacity = 0, 200);

    setTimeout(() => h.remove(), 200);
  }

  h.onclick = pop;
  h.ontouchstart = pop;

  document.body.appendChild(h);
  setTimeout(() => h.remove(), 3000);
}

let game = setInterval(spawn, 500);

// 😏 MOVE BUTTON
function moveButton() {
  noBtn.style.position = "absolute";
  noBtn.style.top = Math.random() * window.innerHeight + "px";
  noBtn.style.left = Math.random() * window.innerWidth + "px";
}

// 💖 HEART RAIN
function createHeartsRain() {
  let emojis = ["❤️","💖","🎂","✨","🥰","💗"];

  for (let j = 0; j < 6; j++) {
    let h = document.createElement("div");
    h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    h.style.position = "absolute";
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = "25px";

    document.body.appendChild(h);

    h.animate([
      { transform: "translateY(100vh)" },
      { transform: "translateY(-10vh)", opacity: 0 }
    ], { duration: 3000 });

    setTimeout(()=>h.remove(),3000);
  }
}

// 🎬 STORY
let lines = [
"Today feels special…",
"Because it’s your day 🎂",
"I didn’t want to just say happy birthday normally…",
"So I made something for you 😄",
"You make things better…",
"And I’m really glad I know you ❤️"
];

let i = 0;

function startStory() {
  let music = document.getElementById("bgm");
  music.volume = 0.6;
  music.play().catch(()=>{});
  next();
}

function next() {
  if (i < lines.length) {
    msg.innerHTML = lines[i];
    msg.style.opacity = 1;

    createHeartsRain();

    setTimeout(() => {
      msg.style.opacity = 0;
      i++;
      setTimeout(next, 800);
    }, 2200);

  } else {
    endMsg();
  }
}

// 😳 TWIST
function endMsg() {
  msg.style.opacity = 1;

  msg.innerHTML = `
  I wanted to say something…<br><br>

  But I wasn’t sure how 😅<br><br>

  Because some people become special…<br><br>

  Without even realizing it ❤️<br><br>

  <button onclick="reveal()">Should I say it? 😄</button>
  `;
}

// 😏 BUTTON GAME
function reveal() {
  msg.innerHTML = `
  Are you ready? 😏<br><br>

  <button onclick="finalReveal()">YES 😄</button>
  <button onclick="moveButton()" id="noBtn">NO 🙈</button>
  `;
}

// 🎉 FINAL REVEAL
function finalReveal() {
  msg.innerHTML = `
  I tried to make this special…<br><br>

  Because today is not just any day…<br><br>

  It’s YOUR day 🎂❤️<br><br>

  🎉 HAPPY BIRTHDAY MEENU 🎉<br><br>

  You make everything better 🥺<br><br>

  And I’m really happy I know you 💖<br><br>

  <button onclick="showBirthday()">Open your gift 🎁</button>
  `;

  createHeartsRain();
}

// 🎁 FINAL MESSAGE
function showBirthday() {
  msg.innerHTML = `
  🎁 This is for you…<br><br>

  Not just a website…<br><br>

  But a small effort for someone special ❤️<br><br>

  I hope today brings you smiles 😊<br><br>

  And maybe… I was part of it 😄<br><br>

  🎂 HAPPY BIRTHDAY AGAIN 💖
  `;

  startFinalEffect();
}

// ✨ FINAL EFFECT
function startFinalEffect() {
  let emojis = ["❤️","💖","🎂","✨","🥰"];

  setInterval(() => {
    let e = document.createElement("div");
    e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.position = "absolute";
    e.style.left = Math.random()*100 + "vw";
    e.style.fontSize = "35px";

    document.body.appendChild(e);

    e.animate([
      { transform: "translateY(100vh)" },
      { transform: "translateY(-10vh)", opacity: 0 }
    ], { duration: 4000 });

    setTimeout(()=>e.remove(),4000);
  }, 250);
}

</script>

</body>
</html>
