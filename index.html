<!DOCTYPE html>
<html>
<head>
<title>April 1st</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;

  background: url("bg.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* loading */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  z-index: 1000;
}

/* main */
#main {
  display: none;
  margin-top: 120px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #00c853; }
#noBtn { background: #d50000; color: white; }

#msg {
  font-size: 28px;
  opacity: 0;
  transition: opacity 1s;
  min-height: 80px;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 26px;
  animation: fly 5s linear forwards;
}

@keyframes fly {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* game hearts */
.popHeart {
  position: fixed;
  font-size: 50px;
  cursor: pointer;
  z-index: 1500;
  user-select: none;
  touch-action: manipulation;
}

/* red flash */
#flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: red;
  opacity: 0;
  z-index: 2000;
  pointer-events: none;
  transition: opacity 0.3s;
}
</style>
</head>

<body>

<div id="flash"></div>

<!-- LOADING -->
<div id="loading">
  <span>Loading something for Meenu... 😄</span>

  <p style="font-size:18px; opacity:0.85; margin-top:10px;">
    While you wait… catch the hearts if you can 😁❤️
  </p>

  <span id="countdown" style="font-size:20px; margin-top:10px;"></span>
</div>

<div id="main">

  <h2>Meenu… should I say this today or not? 😄</h2>

  <p style="font-size:20px; opacity:0.9;">
    don’t mute it… it’s better that way 🔇
  </p>

  <button id="yesBtn" onclick="startStory()">Click me</button>
  <button id="noBtn" onclick="moveButton()">Don't click</button>

  <p id="msg"></p>

</div>

<audio id="bgm">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// ⏳ TIMER
let timeLeft = 20;

let countdown = setInterval(() => {
  document.getElementById("countdown").innerHTML =
    "Wait a moment… " + timeLeft + "s ⏳";

  timeLeft--;

  if (timeLeft < 0) {
    clearInterval(countdown);
    clearInterval(gameInterval);

    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
  }
}, 1000);

// 🎮 GAME
function spawnPopHeart() {
  let heart = document.createElement("div");
  heart.className = "popHeart";
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 90 + "vw";
  heart.style.top = Math.random() * 90 + "vh";

  function popEffect() {
    heart.innerHTML = "💥";
    heart.style.transform = "scale(1.5)";

    let flash = document.getElementById("flash");
    flash.style.opacity = 0.7;

    setTimeout(() => {
      flash.style.opacity = 0;
    }, 2000);

    setTimeout(() => heart.remove(), 200);
  }

  heart.addEventListener("click", popEffect);
  heart.addEventListener("touchstart", popEffect);

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 4000);
}

let gameInterval = setInterval(spawnPopHeart, 600);

// 😂 moving button
function moveButton() {
  let btn = document.getElementById("noBtn");
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

// 💬 STORY
let lines = [
  "I thought of saying something today…",
  "But then I realized it's April 1st 😄",
  "So you probably won’t take it seriously.",
  "Still… I enjoy talking to you.",
  "More than I expected.",
  "And yeah… this part isn’t a joke."
];

let i = 0;

function startStory() {
  let music = document.getElementById("bgm");
  music.volume = 0.5;
  music.play();

  showNext();
}

function showNext() {
  let msg = document.getElementById("msg");

  if (i < lines.length) {
    msg.innerHTML = lines[i];
    msg.style.opacity = 1;

    createHeartsBurst();

    setTimeout(() => {
      msg.style.opacity = 0;
      i++;
      setTimeout(showNext, 1000);
    }, 2500);

  } else {
    showFullMessage();
  }
}

// ❤️ burst
function createHeartsBurst() {
  let emojis = ["❤️","💖","💕","💗","💓","🦋"];

  for (let j = 0; j < 8; j++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }
}

// 🌧️ rain
function startHeartRain() {
  let emojis = ["❤️","💖","💕","💗","💓","🦋","🦋"];

  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }, 200);
}

// 🤣 LOL rain
function startLaughRain() {
  let emojis = ["😂","🤣","😆","😜","😝"];

  setInterval(() => {
    let e = document.createElement("div");
    e.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.position = "absolute";
    e.style.fontSize = "40px";
    e.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(e);

    e.animate([
      { transform: "translateY(100vh)", opacity: 1 },
      { transform: "translateY(-10vh)", opacity: 0 }
    ], {
      duration: 3000,
      easing: "linear"
    });

    setTimeout(() => e.remove(), 3000);

  }, 150);
}

// 💥 FINAL MESSAGE
function showFullMessage() {
  let msg = document.getElementById("msg");

  msg.style.opacity = 1;

  msg.innerHTML = `
I thought of saying something today…<br><br>

But then I realized it's April 1st 😄<br><br>

So you probably won’t take it seriously.<br><br>

Still… I enjoy talking to you.<br><br>

More than I expected.<br><br>

And yeah… this part isn’t a joke ❤️ I meant it.<br><br>

<button onclick="aprilFool()" style="
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#ff4081;
  color:white;
  cursor:pointer;
">
  One more thing 😘
</button>
`;

  startHeartRain();
}

// 😈 APRIL FOOL
function aprilFool() {
  let msg = document.getElementById("msg");

  msg.innerHTML = `
  <div style="font-size:40px; font-weight:bold;">
    okay okay…<br>
    APRIL FOOL 😂😂😂<br>
    but I meant some of it 😄
  </div>
  `;

  startLaughRain();
}

</script>

</body>
</html>
