<!DOCTYPE html>
<html>
<head>
<title>April 1st</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* Loading screen */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}

/* Main content */
#main {
  display: none;
  margin-top: 100px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #00c853; color: white; }
#noBtn { background: #d50000; color: white; }

#msg {
  margin-top: 30px;
  font-size: 20px;
  min-height: 60px;
}

</style>
</head>

<body>

<div id="loading">Loading something stupid... 😄</div>

<div id="main">
  <h2>Hey Meenu... you actually opened this 😄</h2>

  <button id="yesBtn" onclick="startMessage()">Click me</button>
  <button id="noBtn" onclick="moveButton()">Don't click</button>

  <p id="msg"></p>
</div>

<audio id="bgm" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

// Fake loading
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2000);

// Moving button
function moveButton() {
  let btn = document.getElementById("noBtn");
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

// Typing effect
function typeText(text, i = 0) {
  if (i < text.length) {
    document.getElementById("msg").innerHTML += text.charAt(i);
    setTimeout(() => typeText(text, i + 1), 40);
  }
}

// Start message
function startMessage() {
  document.getElementById("msg").innerHTML = "";

  let message = "Okay Meenu... I was actually planning to say something today.\n\n" +
                "But then I realized... today is April 1st 😄\n\n" +
                "So anything I say will sound like a joke.\n\n" +
                "But still...\n\n" +
                "I really enjoy talking to you.\n\n" +
                "And yeah... this part isn’t a joke.";

  typeText(message);
  document.getElementById("bgm").play();
}

</script>

</body>
</html>
