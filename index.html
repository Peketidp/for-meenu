<!DOCTYPE html>
<html>
<head>
<title>April 1st</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: url("bg.jpg") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* loading */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  z-index: 1000;
}

/* popup */
#popup {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 3000;
}

/* main */
#main {
  display: none;
  margin-top: 120px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #00c853; }
#noBtn { background: #d50000; color: white; }

#msg {
  font-size: 28px;
  opacity: 0;
  transition: opacity 1s;
}

/* game hearts */
.popHeart {
  position: fixed;
  font-size: 50px;
  cursor: pointer;
  z-index: 1500;
}

/* flash */
#flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: red;
  opacity: 0;
  z-index: 2000;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="flash"></div>

<!-- POPUP -->
<div id="popup">
  <div style="background:#222;padding:30px;border-radius:12px;text-align:center;">
    <h3>One last thing… 🎁</h3>
    <button onclick="showBirthday()">Open it 😄</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <span>Loading something for Meenu... 😄</span>
  <p style="font-size:18px;">While you wait… catch the hearts if you can ❤️</p>
  <span id="countdown"></span>
</div>

<div id="main">

  <h2>Meenu… should I say this today or not? 😄</h2>

  <p style="font-size:18px; opacity:0.8;">
    plug in your earphones… for better experience 🎧
  </p>

  <button id="yesBtn" onclick="startStory()">Click me</button>
  <button id="noBtn" onclick="moveButton()">Don't click</button>

  <p id="msg"></p>

</div>

<audio id="bgm">
  <source src="music.mp3">
</audio>

<script>

// TIMER
let t = 20;
let c = setInterval(() => {
  countdown.innerHTML = "Wait a moment… " + t + "s ⏳";
  t--;
  if (t < 0) {
    clearInterval(c);
    clearInterval(game);
    loading.style.display = "none";
    main.style.display = "block";
  }
}, 1000);

// GAME
function spawn() {
  let h = document.createElement("div");
  h.className = "popHeart";
  h.innerHTML = "❤️";

  h.style.left = Math.random() * 90 + "vw";
  h.style.top = Math.random() * 90 + "vh";

  function pop() {
    h.innerHTML = "💥";
    flash.style.opacity = 0.7;
    setTimeout(() => flash.style.opacity = 0, 2000);
    setTimeout(() => h.remove(), 200);
  }

  h.onclick = pop;
  h.ontouchstart = pop;

  document.body.appendChild(h);
  setTimeout(() => h.remove(), 4000);
}

let game = setInterval(spawn, 600);

// MOVE BUTTON
function moveButton() {
  noBtn.style.position = "absolute";
  noBtn.style.top = Math.random() * window.innerHeight + "px";
  noBtn.style.left = Math.random() * window.innerWidth + "px";
}

// HEART RAIN DURING STORY
function createHeartsRain() {
  let emojis = ["❤️","💖","💕","💗","🦋"];

  for (let j = 0; j < 6; j++) {
    let h = document.createElement("div");
    h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    h.style.position = "absolute";
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = "25px";

    document.body.appendChild(h);

    h.animate([
      { transform: "translateY(100vh)", opacity: 1 },
      { transform: "translateY(-10vh)", opacity: 0 }
    ], { duration: 3000 });

    setTimeout(()=>h.remove(),3000);
  }
}

// STORY
let lines = [
"I thought of saying something today…",
"But then I realized it's April 1st 😄",
"So you probably won’t take it seriously.",
"Still… I enjoy talking to you.",
"More than I expected.",
"And yeah… this part isn’t a joke."
];

let i = 0;

function startStory() {
  bgm.play();
  next();
}

function next() {
  if (i < lines.length) {
    msg.innerHTML = lines[i];
    msg.style.opacity = 1;

    createHeartsRain();

    setTimeout(() => {
      msg.style.opacity = 0;
      i++;
      setTimeout(next, 1000);
    }, 2500);

  } else {
    endMsg();
  }
}

// FINAL FULL MESSAGE
function endMsg() {
  msg.style.opacity = 1;

  msg.innerHTML = `
I thought of saying something today…<br><br>
But then I realized it's April 1st 😄<br><br>
So you probably won’t take it seriously.<br><br>
Still… I enjoy talking to you.<br><br>
More than I expected.<br><br>
And yeah… this part isn’t a joke ❤️ I meant it.<br><br>

<button onclick="aprilFool()">One more thing 😄</button>
`;
}

// LOL RAIN
function startLaughRain() {
  let emojis = ["😂","🤣","😆","😜","😝"];

  setInterval(() => {
    let e = document.createElement("div");
    e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.position = "absolute";
    e.style.left = Math.random()*100 + "vw";
    e.style.fontSize = "40px";

    document.body.appendChild(e);

    e.animate([
      { transform: "translateY(100vh)", opacity: 1 },
      { transform: "translateY(-10vh)", opacity: 0 }
    ], { duration: 3000 });

    setTimeout(()=>e.remove(),3000);
  }, 150);
}

// APRIL FOOL
function aprilFool() {
  msg.innerHTML = `
  okay okay…<br>
  APRIL FOOL 😂😂😂<br>
  but I meant some of it 😄
  `;

  startLaughRain();
  popup.style.display = "flex";
}

// FINAL EFFECT
function startFinalEffect() {
  let emojis = ["🦋","👼","✨","💫"];

  setInterval(() => {
    let e = document.createElement("div");
    e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.position = "absolute";
    e.style.left = Math.random()*100 + "vw";
    e.style.fontSize = "35px";

    document.body.appendChild(e);

    e.animate([
      { transform: "translateY(100vh)", opacity: 1 },
      { transform: "translateY(-10vh)", opacity: 0 }
    ], { duration: 4000 });

    setTimeout(()=>e.remove(),4000);
  }, 250);
}

// BIRTHDAY
function showBirthday() {
  popup.style.display = "none";

  msg.innerHTML = `
  🎁 Advance Happy Birthday Meenluu🤪 🎂❤️<br><br>
  <div id="bday"></div>
  `;

  startFinalEffect();

  let target = new Date();
  target.setMonth(3);
  target.setDate(4);
  target.setHours(0,0,0,0);

  if (new Date() > target) {
    target.setFullYear(target.getFullYear() + 1);
  }

  let timer = setInterval(() => {
    let d = new Date();
    let diff = target - d;

    let days = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor((diff/(1000*60*60))%24);
    let m = Math.floor((diff/(1000*60))%60);
    let s = Math.floor((diff/1000)%60);

    bday.innerHTML = days+"d "+h+"h "+m+"m "+s+"s";

    if (diff < 0) {
      clearInterval(timer);
      bday.innerHTML = "🎉 Happy Birthday Meenu 🎂❤️";
    }

  }, 1000);
}

</script>

</body>
</html>
